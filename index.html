  function defaultLoi(){return {loiDate:new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'}),purchaserEntity:'Proverbs31 Underwrite LLC and/or assigns',purchaserDisplay:'Proverbs31 Underwrite LLC',propertyAddress:'Montgomery, TX (Grand Monarch Apartments)',offerPrice:5650000,emdAmount:150000,emdDueDays:3,ddDays:30,closeDays:45,financingContingency:'Yes - loan approval and clear title',financeApplicationDays:15,loanApprovalDays:60,offerExpiryDays:7,titleInsurance:"At Seller's expense, Seller shall deliver a preliminary title.",purchaserConditions:'Seller shall provide Purchaser due diligence items, including rent roll, T-12, vendor contracts, tax bills, survey, and major reports.',additionalTerms:'Both parties pay their own legal and brokerage costs unless otherwise agreed in writing. Draft remains editable before it is sent.',sendToEmail:'',ccEmail:'',replyToEmail:'P31LS@gmail.com',subject:'Letter of Intent - Grand Monarch Apartments',emailMessage:'Please review the attached Letter of Intent. This draft is editable and can be revised before it is sent.',documentText:''};}

  function num(v,d){if(d===undefined)d=0;if(v===null||v===undefined)return d;var cleaned=String(v).replace(/[$,%\s,]/g,'');var n=Number(cleaned);return Number.isFinite(n)?n:d;}
  function money(n){return new Intl.NumberFormat(undefined,{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(n)||0);}
  function pct(n,d){if(d===undefined)d=1;return ((Number(n)||0).toFixed(d))+'%';}
  function escapeHtml(str){return String(str==null?'':str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');}
  function avgMetric(key){var vals=state.deals.map(function(d){return Number(d[key])||0;}).filter(function(v){return v>0;});return vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:0;}
  function annualDebtService(uw){var loan=uw.purchasePrice*(uw.ltv/100);var r=uw.rate/100/12;var n=uw.amortYears*12;if(!loan||!n)return 0;var pmt=r===0?loan/n:(loan*r)/(1-Math.pow(1+r,-n));return pmt*12;}
  function egi(uw){return (uw.actualMonthlyRent*12*(1-uw.vacancyPct/100))+uw.otherIncomeAnnual;}
  function noi(uw){return egi(uw)-uw.opExAnnual;}
  function capRate(uw){return uw.purchasePrice?(noi(uw)/uw.purchasePrice)*100:0;}
  function dscr(uw){var ds=annualDebtService(uw);return ds?noi(uw)/ds:0;}
  function loanAmount(uw){return uw.purchasePrice*(uw.ltv/100);}
  function equityNeeded(uw){return uw.purchasePrice-loanAmount(uw)+uw.closingCosts+uw.capex+uw.reserves+uw.lenderReserves;}
  function totalCashInvested(uw){return uw.initialEquity&&uw.initialEquity>0?uw.initialEquity:equityNeeded(uw);}
  function terminalValue(uw){return uw.exitCap?noi(uw)/(uw.exitCap/100):0;}
  function remainingBalance(uw){var principal=loanAmount(uw);var r=uw.rate/100/12;var n=uw.amortYears*12;var m=Math.max((uw.holdYears-uw.ioYears)*12,0);if(!principal)return 0;if(r===0){var p0=principal/n;return Math.max(0,principal-p0*m);}var pmt=(principal*r)/(1-Math.pow(1+r,-n));if(m<=0)return principal;return principal*Math.pow(1+r,m)-pmt*((Math.pow(1+r,m)-1)/r);}
  function annualPreTaxCashFlow(uw,year){if(year===undefined)year=1;var ioDebt=loanAmount(uw)*(uw.rate/100);var amortDebt=annualDebtService(uw);var debt=year<=uw.ioYears?ioDebt:amortDebt;return noi(uw)-debt;}
  function totalCashDistributions(uw){var total=0;for(var y=1;y<=uw.holdYears;y++){total+=annualPreTaxCashFlow(uw,y);}return total;}
  function netSaleProceeds(uw){var saleCosts=terminalValue(uw)*0.01;return Math.max(terminalValue(uw)-saleCosts-remainingBalance(uw),0);}
  function cashOnCash(uw){var invested=totalCashInvested(uw);return invested?annualPreTaxCashFlow(uw,1)/invested:0;}
  function equityMultiple(uw){var invested=totalCashInvested(uw);return invested?(totalCashDistributions(uw)+netSaleProceeds(uw))/invested:0;}
  function irrFromCashFlows(flows){if(!flows||flows.length<2)return 0;function npv(rate){return flows.reduce(function(sum,cf,i){return sum+(cf/Math.pow(1+rate,i));},0);}var low=-0.99,high=10,npvLow=npv(low),npvHigh=npv(high),guard=0;while(npvLow*npvHigh>0&&guard<50){high*=2;npvHigh=npv(high);guard+=1;}if(npvLow*npvHigh>0)return 0;for(var i=0;i<180;i++){var mid=(low+high)/2;var npvMid=npv(mid);if(Math.abs(npvMid)<0.0000001)return mid;if(npvLow*npvMid<=0){high=mid;npvHigh=npvMid;}else{low=mid;npvLow=npvMid;}}return (low+high)/2;}
  function irr(uw){var flows=[-totalCashInvested(uw)];for(var y=1;y<=uw.holdYears;y++){var cf=annualPreTaxCashFlow(uw,y);if(y===uw.holdYears)cf+=netSaleProceeds(uw);flows.push(cf);}return irrFromCashFlows(flows)*100;}
  function refiValue(uw){return uw.refiCap?noi(uw)/(uw.refiCap/100):0;}
  function refiProceeds(uw){var gross=refiValue(uw)*(uw.refiLtv/100);return Math.max(gross-remainingBalance(Object.assign({},uw,{holdYears:1})),0);}
  function dealScore(uw){var score=0;if(capRate(uw)>=uw.marketCap)score+=1;else if(capRate(uw)>=uw.marketCap*0.9)score+=0.5;if(dscr(uw)>=1.25)score+=1;else if(dscr(uw)>=1.15)score+=0.5;if(equityMultiple(uw)>=2)score+=1;else if(equityMultiple(uw)>=1.7)score+=0.5;if(irr(uw)>=15)score+=0.5;else if(irr(uw)>=12)score+=0.25;if(score>=2.75)return {label:'Good',cls:'good'};if(score>=1.75)return {label:'Borderline',cls:'borderline'};return {label:'Bad',cls:'bad'};}

iewSend)reviewSend.onclick=function(){if(!String(state.loi.sendToEmail||'').trim()){flash('Type the recipient email address before sending the LOI.','error');return;}alert('To: '+state.loi.sendToEmail+'\nCC: '+(state.loi.ccEmail||'None')+'\nReply-To: '+state.loi.replyToEmail+'\nSubject: '+state.loi.subject+'\n\nThe LOI is ready for final review.');};['printPdf','printPdfFinal'].forEach(function(id){var btn=document.getElementById(id);if(btn)btn.onclick=function(){printPreviewWindow();};});['openWindow','openWindowFinal'].forEach(function(id){var btn=document.getElementById(id);if(btn)btn.onclick=function(){openStandalonePreview();};});}
  async function processUploadFile(key,file,multi){var kind=detectKind(file.name);var extractedText='';var summary='';try{extractedText=await extractTextFromFile(file,kind);summary=summarizeExtraction(file,extractedText,kind);state.extraction.log.unshift('Loaded '+file.name+' and read '+(extractedText?extractedText.length.toLocaleString():0)+' characters.');}catch(err){state.extraction.parseErrors.unshift(file.name+': '+(err.message||String(err)));state.extraction.log.unshift('Loaded '+file.name+', but parsing failed. File is still attached.');}var record={fileName:file.name,size:file.size,kind:kind,extractedText:extractedText,extractSummary:summary,uploadedAt:new Date().toISOString()};if(key==='other'&&multi)state.uploads.other.push(record);else state.uploads[key]=record;state.ui.flash=file.name+' uploaded.';state.ui.flashType='success';}
  function detectKind(name){var lower=name.toLowerCase();if(lower.endsWith('.pdf'))return 'pdf';if(lower.endsWith('.xlsx')||lower.endsWith('.xls'))return 'spreadsheet';if(lower.endsWith('.csv'))return 'csv';if(lower.endsWith('.docx'))return 'docx';if(lower.endsWith('.doc'))return 'doc';if(lower.endsWith('.txt'))return 'txt';if(lower.endsWith('.json'))return 'json';if(/\.(png|jpg|jpeg|webp)$/.test(lower))return 'image';return 'file';}
  async function extractTextFromFile(file,kind){if(kind==='pdf')return extractPdfText(file);if(kind==='spreadsheet'||kind==='csv')return extractSheetText(file);if(kind==='docx')return extractDocxText(file);if(kind==='txt'||kind==='json'||kind==='doc'||kind==='file')return file.text();return '';}
  async function extractPdfText(file){var arrayBuffer=await file.arrayBuffer();if(!window.pdfjsLib)throw new Error('PDF reader not available in this browser session.');window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';var pdf=await window.pdfjsLib.getDocument({data:arrayBuffer}).promise;var text='';for(var i=1;i<=pdf.numPages;i++){var page=await pdf.getPage(i);var content=await page.getTextContent();text+=content.items.map(function(item){return item.str;}).join(' ')+'\n';}return text;}
  async function extractSheetText(file){var arrayBuffer=await file.arrayBuffer();var wb=XLSX.read(arrayBuffer,{type:'array'});var text='';wb.SheetNames.forEach(function(name){var ws=wb.Sheets[name];var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false});text+='SHEET: '+name+'\n';rows.forEach(function(row){text+=row.map(function(v){return String(v==null?'':v);}).join(' | ')+'\n';});});return text;}
  async function extractDocxText(file){if(!window.mammoth)throw new Error('DOCX reader not available in this browser session.');var arrayBuffer=await file.arrayBuffer();var result=await window.mammoth.extractRawText({arrayBuffer:arrayBuffer});return result.value||'';}
  function summarizeExtraction(file,text,kind){if(!text)return 'Uploaded '+kind.toUpperCase()+' file. No extractable text found.';var chars=text.length.toLocaleString();var lines=text.split(/\n+/).filter(Boolean).length.toLocaleString();return 'Read '+chars+' characters across '+lines+' lines.';}
  function getAllUploadedRecords(){var list=[];['t12','rentRoll','om','costar'].forEach(function(k){if(state.uploads[k])list.push(Object.assign({slot:k},state.uploads[k]));});state.uploads.other.forEach(function(x){list.push(Object.assign({slot:'other'},x));});return list;}
  function sumRentFromSheetText(text){if(!text)return 0;var lines=text.split(/\n+/).map(function(s){return s.trim();}).filter(Boolean);var sum=0;for(var i=0;i<lines.length;i++){var line=lines[i];var pieces=line.split('|').map(function(x){return x.trim();});if(pieces.length<2)continue;for(var j=0;j<pieces.length;j++){if(/\$?\d/.test(pieces[j])&&!/%/.test(pieces[j])){var value=num(pieces[j],NaN);if(Number.isFinite(value)&&value>250&&value<20000){sum+=value;break;}}}}return sum>0?sum:0;}
  function extractNumbers(text,regex){var matches=[];var m;while((m=regex.exec(text))!==null){matches.push(num(m[1]));}return matches.filter(function(v){return Number.isFinite(v);});}
  function bestCapBenchmark(text){var nums=extractNumbers(text,/(\d{1,2}(?:\.\d+)?)\s*%/g).filter(function(v){return v>=4&&v<=9;});if(!nums.length)return 0;return nums.reduce(function(a,b){return a+b;},0)/nums.length;}
  function firstMoneyAfter(text,words){var idx=text.toLowerCase().search(words);if(idx<0)return 0;var slice=text.slice(idx,idx+300);var m=slice.match(/\$?\s*([0-9][0-9,]*(?:\.\d+)?)/);return m?num(m[1]):0;}
  function firstIntAfter(text,words){var idx=text.toLowerCase().search(words);if(idx<0)return 0;var slice=text.slice(idx,idx+180);var m=slice.match(/([0-9]{1,4})/);return m?num(m[1]):0;}
  function firstAddress(text){var patterns=[/address\s*[:\-]\s*(.+)/i,/property address\s*[:\-]\s*(.+)/i];for(var i=0;i<patterns.length;i++){var m=text.match(patterns[i]);if(m&&m[1])return m[1].split('\n')[0].trim();}return '';}
  function runExtraction(){var uploads=getAllUploadedRecords();var parts=uploads.map(function(x){return x.extractedText||'';}).filter(Boolean);var combinedText=parts.join('\n\n');state.extraction.combinedText=combinedText;state.extraction.extracted={};state.extraction.log=[];state.extraction.parseErrors=state.extraction.parseErrors||[];if(!combinedText){state.extraction.log.push('No extractable text found yet. Upload files and try again.');render();flash('No extractable text found yet.','error');return;}var address=firstAddress(combinedText);if(address){state.underwriting.propertyAddress=address;state.loi.propertyAddress=address;state.extraction.log.push('Property address extracted: '+address);}var units=firstIntAfter(combinedText,/number of units|unit count|# of units|units/i);if(units){state.underwriting.units=units;state.extraction.log.push('Units extracted: '+units);}var ask=firstMoneyAfter(combinedText,/ask price|purchase price|asking price/i);if(ask){state.underwriting.purchasePrice=ask;state.extraction.log.push('Asking price extracted: '+money(ask));}var opx=firstMoneyAfter(combinedText,/operating expenses|expense per unit|opex|total operating expenses/i);if(opx&&opx>1000&&opx<100000000){if(/expense per unit/i.test(combinedText)&&state.underwriting.units)state.underwriting.opExAnnual=opx*state.underwriting.units;else state.underwriting.opExAnnual=opx;state.extraction.log.push('Operating expense extracted: '+money(state.underwriting.opExAnnual));}
    var avgRent=firstMoneyAfter(combinedText,/average monthly rent|avg mo rent|avg rent/i);if(avgRent&&avgRent<5000){state.underwriting.avgUnitRent=avgRent;state.extraction.log.push('Average unit rent extracted: '+money(avgRent));}
    var rrText=(state.uploads.rentRoll&&state.uploads.rentRoll.extractedText)||'';var monthly=0;var rrSum=sumRentFromSheetText(rrText);if(rrSum)monthly=rrSum;var monthlyScheduled=firstMoneyAfter(combinedText,/monthly scheduled rent|total monthly rent|current monthly rent|monthly rent/i);if(!monthly&&monthlyScheduled&&monthlyScheduled>2000)monthly=monthlyScheduled;if(!monthly&&state.underwriting.avgUnitRent&&state.underwriting.units)monthly=state.underwriting.avgUnitRent*state.underwriting.units;if(monthly){state.underwriting.actualMonthlyRent=Math.round(monthly);state.extraction.log.push('Actual monthly rent set to: '+money(state.underwriting.actualMonthlyRent));}
    var otherIncome=firstMoneyAfter(combinedText,/other residential income|other income/i);if(otherIncome){state.underwriting.otherIncomeAnnual=otherIncome;state.extraction.log.push('Other income extracted: '+money(otherIncome));}
    var vacancy=firstIntAfter(combinedText,/vacancy|vacancy loss|economic vacancy/i);if(vacancy&&vacancy<=50){state.underwriting.vacancyPct=vacancy;state.extraction.log.push('Vacancy extracted: '+vacancy+'%');}
    var costarText=(state.uploads.costar&&state.uploads.costar.extractedText)||combinedText;var benchmark=bestCapBenchmark(costarText);if(benchmark){state.underwriting.marketCap=Number(benchmark.toFixed(2));state.extraction.log.push('Market cap benchmark set from comps: '+benchmark.toFixed(2)+'%');}
    var otherText=state.uploads.other.map(function(x){return x.extractedText||'';}).join('\n');var omText=(state.uploads.om&&state.uploads.om.extractedText)||'';var dueItems=dueDiligenceItemsFromText(otherText+'\n'+omText+'\n'+costarText);if(dueItems.length){state.extraction.extracted.dueItems=dueItems;state.extraction.log.push('Captured '+dueItems.length+' due diligence item(s) for Exhibit A-1.');}
    state.loi.offerPrice=state.underwriting.offerPrice||Math.round(state.underwriting.purchasePrice*0.94);state.loi.subject='Letter of Intent - '+state.underwriting.propertyName;state.loi.documentText=buildLoiText();state.extraction.lastRun=new Date().toISOString();render();flash('Extraction complete.');}
  function drawPLChart(){var canvas=document.getElementById('plCanvas');if(!canvas)return;var ctx=canvas.getContext('2d');if(!ctx)return;var items=[['Rent + Other',egi(state.underwriting)],['OpEx',state.underwriting.opExAnnual],['Debt Service',annualDebtService(state.underwriting)],['Annual Pre-Tax CF',annualPreTaxCashFlow(state.underwriting,1)],['NOI',noi(state.underwriting)]];var values=items.map(function(x){return Math.max(0,x[1]);});var max=Math.max.apply(null,values.concat([1]));canvas.width=canvas.clientWidth*window.devicePixelRatio;canvas.height=canvas.clientHeight*window.devicePixelRatio;ctx.scale(window.devicePixelRatio,window.devicePixelRatio);var w=canvas.clientWidth,h=canvas.clientHeight;ctx.clearRect(0,0,w,h);var colors=['#1f2d57','#8ea2c4','#d59b2f','#846deb','#67c16f'];var gap=18,barW=(w-gap*(items.length+1))/items.length;items.forEach(function(item,i){var x=gap+i*(barW+gap),bh=(Math.max(0,item[1])/max)*(h-60),y=h-30-bh;ctx.fillStyle=colors[i];ctx.fillRect(x,y,barW,bh);ctx.fillStyle='#6a7892';ctx.font='12px Inter, sans-serif';ctx.fillText(item[0],x,h-10);ctx.fillStyle='#23304b';ctx.font='11px Inter, sans-serif';ctx.fillText('$'+Math.round(item[1]).toLocaleString(),x,y-6);});}
  function standalonePreviewHtml(){var preview=document.getElementById('pdfPreviewRoot');var inner=preview?preview.innerHTML:'';var style=document.querySelector('style').innerHTML;return '<!DOCTYPE html><html><head><meta charset="utf-8"><title>LOI Preview</title><style>'+style+'</style></head><body><div class="main" style="padding:24px">'+inner+'</div></body></html>';}
  function printPreviewWindow(){var win=window.open('','_blank');if(!win)return;win.document.open();win.document.write(standalonePreviewHtml());win.document.close();win.focus();setTimeout(function(){win.print();},250);}function openStandalonePreview(){var win=window.open('','_blank');if(!win)return;win.document.open();win.document.write(standalonePreviewHtml());win.document.close();}
