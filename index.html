<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proverbs31 Underwrite - Prototype</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#eef2f7;
      --panel:#ffffff;
      --panel-2:#f7f9fc;
      --line:#d9e0ea;
      --text:#253047;
      --muted:#7a879d;
      --nav:#0f1a36;
      --nav-2:#1f2d57;
      --primary:#1f2d57;
      --primary-2:#2c3e73;
      --green:#67c16f;
      --green-bg:#e6f4e9;
      --amber:#d39a32;
      --amber-bg:#f7efdf;
      --purple:#7f67e8;
      --purple-bg:#ebe7fb;
      --blue:#6d89f5;
      --blue-bg:#e8edff;
      --red:#dd655c;
      --radius:20px;
      --shadow:0 1px 0 rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit}
    .app{display:flex;min-height:100vh}
    .sidebar{width:304px;background:linear-gradient(180deg,#101a37 0%, #0d1730 100%);color:#fff;display:flex;flex-direction:column;justify-content:space-between}
    .brand{display:flex;gap:14px;align-items:center;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.08)}
    .brand-badge{width:38px;height:38px;border-radius:10px;background:#d7b657;color:#fff;display:grid;place-items:center;font-weight:800}
    .brand-title{font-size:18px;font-weight:700;line-height:1}
    .brand-sub{font-size:14px;color:rgba(255,255,255,.7);margin-top:4px}
    .nav{padding:20px 14px}
    .nav-group{display:grid;gap:8px}
    .nav-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:transparent;color:rgba(255,255,255,.78);border:0;padding:14px 14px;border-radius:14px;cursor:pointer}
    .nav-btn:hover{background:rgba(255,255,255,.06)}
    .nav-btn.active{background:#24325f;color:#fff}
    .nav-left{display:flex;align-items:center;gap:14px}
    .nav-ico{width:24px;text-align:center;font-size:22px;line-height:1}
    .nav-plus{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:8px;background:#d7b657;color:#fff;font-weight:700;font-size:15px}
    .user-card{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-top:1px solid rgba(255,255,255,.08)}
    .user-main{display:flex;gap:14px;align-items:center}
    .avatar{width:34px;height:34px;border-radius:999px;background:#24325f;display:grid;place-items:center;font-weight:700}
    .user-name{font-weight:700}
    .user-email{color:rgba(255,255,255,.68)}
    .logout{font-size:20px;color:rgba(255,255,255,.7)}
    .main{flex:1;padding:28px 36px 40px}
    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px}
    .title{font-size:34px;font-weight:800;line-height:1.15;margin:4px 0 6px}
    .subtitle{font-size:18px;color:var(--muted)}
    .top-action{background:var(--primary);color:#fff;border:0;border-radius:14px;padding:14px 24px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
    .top-action:hover{background:var(--primary-2)}
    .grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:18px}
    .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
    .metric{padding:24px 26px}
    .metric-label{font-size:16px;color:#8895ad;margin-bottom:10px}
    .metric-value{font-size:34px;font-weight:800}
    .metric-note{margin-top:8px;font-size:15px}
    .up{color:var(--green)}
    .down{color:var(--red)}
    .section{margin-top:22px}
    .section-head{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 14px}
    .section-title{font-size:18px;font-weight:800}
    .section-body{padding:0 24px 24px}
    .pipeline{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:16px}
    .stage{padding:22px;border-radius:16px;text-align:center;font-weight:700}
    .stage-num{font-size:46px;line-height:1;margin-bottom:8px}
    .stage-sm{font-size:14px;color:var(--muted);font-weight:600}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 24px;border-bottom:1px solid var(--line)}
    .search{display:flex;align-items:center;gap:12px;background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:12px 14px;min-width:380px}
    .search input{border:0;background:transparent;outline:none;width:100%;font-size:16px;color:var(--text)}
    .chips{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .chip{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:10px 16px;color:#67758d;cursor:pointer}
    .chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .sort-wrap{display:flex;align-items:center;gap:12px;color:#7f8da5}
    .sort-wrap select{border:1px solid var(--line);border-radius:12px;padding:10px 14px;background:#fff;color:var(--text)}
    table{width:100%;border-collapse:collapse}
    th{font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:#95a1b7;text-align:left;padding:18px}
    td{padding:20px 18px;border-top:1px solid var(--line);vertical-align:top}
    .prop-name{font-size:18px;font-weight:700;margin-bottom:4px}
    .prop-sub{color:#8a97ad}
    .pill{display:inline-flex;align-items:center;border-radius:999px;padding:7px 14px;font-weight:700}
    .pill.green{background:var(--green-bg);color:var(--green)}
    .pill.amber{background:var(--amber-bg);color:var(--amber)}
    .pill.purple{background:var(--purple-bg);color:var(--purple)}
    .pill.blue{background:var(--blue-bg);color:var(--blue)}
    .btn-lite{border:2px solid #42517c;background:#fff;color:#2b3758;border-radius:14px;padding:9px 16px;font-weight:700;cursor:pointer}
    .btn-ghost{border:1px solid var(--line);background:#f6f8fb;color:#71809b;border-radius:14px;padding:9px 16px;font-weight:700;cursor:pointer}
    .stepper{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;align-items:center;margin:12px 0 24px}
    .step{display:flex;align-items:center;gap:14px;color:#94a0b5}
    .step-circle{width:34px;height:34px;border-radius:999px;background:#e6ebf3;color:#7c879c;display:grid;place-items:center;font-weight:800}
    .step.active .step-circle{background:var(--primary);color:#fff}
    .step.done .step-circle{background:var(--green);color:#fff}
    .step.active,.step.done{color:var(--text)}
    .step-label{font-size:14px;font-weight:700}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .field label{display:block;font-size:15px;font-weight:700;margin-bottom:8px}
    .field input,.field select,.field textarea{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);outline:none}
    .field textarea{min-height:140px;resize:vertical}
    .hint{color:#7f8da5}
    .upload-list{display:grid;gap:14px}
    .upload-card{display:flex;align-items:center;justify-content:space-between;border:2px solid #77c77b;background:#eef7ef;border-radius:18px;padding:20px 22px}
    .upload-left{display:flex;align-items:center;gap:16px}
    .upload-ico{width:38px;height:38px;border-radius:10px;background:#fff;display:grid;place-items:center;font-size:24px}
    .upload-title{font-size:16px;font-weight:800}
    .req{display:inline-block;background:#f5dfa7;color:#bf8b17;border-radius:8px;padding:4px 8px;margin-left:10px;font-size:12px;font-weight:800}
    .upload-file{color:var(--green);margin-top:6px}
    .upload-meta{color:#97a4ba;margin-left:8px}
    .tabs{display:flex;gap:28px;border-bottom:1px solid var(--line);padding:0 24px}
    .tab{background:none;border:0;padding:18px 0;color:#6e7c94;cursor:pointer;font-size:16px}
    .tab.active{color:var(--text);font-weight:700;border-bottom:3px solid var(--primary)}
    .save-btn{background:var(--primary);color:#fff;border:0;border-radius:14px;padding:14px 24px;font-weight:800}
    .settings-grid{display:grid;gap:18px}
    .switch-row{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-top:1px solid #edf1f6}
    .switch-row:first-child{border-top:0}
    .switch-meta{color:#97a4ba;margin-top:4px}
    .switch{width:56px;height:30px;background:#dce3ee;border-radius:999px;position:relative;border:0;cursor:pointer}
    .switch.on{background:var(--primary)}
    .switch::after{content:"";width:22px;height:22px;border-radius:999px;background:#fff;position:absolute;top:4px;left:4px;transition:left .2s}
    .switch.on::after{left:30px}
    .integration-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}
    .integration{display:flex;justify-content:space-between;align-items:center;padding:24px 28px}
    .integration-main{display:flex;gap:18px;align-items:center}
    .integration-ico{font-size:34px}
    .status-chip{border:2px solid #78c97c;color:#63bf6c;background:#f0fbf0;border-radius:12px;padding:7px 14px;font-weight:700}
    .uw-wrap{padding:20px 24px 24px}
    .uw-header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px}
    .uw-title{font-size:22px;font-weight:800}
    .uw-sub{color:var(--muted)}
    .uw-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
    .uw-tab{background:#f6f8fb;border:1px solid var(--line);border-radius:12px;padding:10px 14px;color:#5e6d87;cursor:pointer}
    .uw-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .kpi-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:16px}
    .kpi{padding:18px 20px;border-radius:18px;border:1px solid var(--line);background:#fff}
    .kpi-label{font-size:14px;color:#8b98ad;margin-bottom:8px}
    .kpi-value{font-size:28px;font-weight:800}
    .bar{height:9px;background:#edf2f8;border-radius:999px;margin-top:12px;overflow:hidden}
    .bar-fill{height:100%;background:linear-gradient(90deg,#66c26f,#1f2d57)}
    .uw-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-top:18px}
    .uw-card{padding:20px;border-radius:20px;border:1px solid var(--line);background:#fff}
    .uw-form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .uw-form-grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .small{font-size:13px;color:#8b98ad}
    .verdict-box{padding:22px;border-radius:20px;color:#fff}
    .verdict-good{background:linear-gradient(135deg,#64c36d,#27437b)}
    .verdict-borderline{background:linear-gradient(135deg,#d39a32,#465a92)}
    .verdict-bad{background:linear-gradient(135deg,#db665f,#465a92)}
    .deal-sheet{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;font-size:15px}
    .deal-sheet div:nth-child(odd){color:#7f8da5}
    .review-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    .review-note{padding:16px 18px;background:#f7f9fc;border:1px dashed #cfd8e6;border-radius:16px;color:#6f7d94;line-height:1.5}
    .score-card{display:flex;flex-direction:column;gap:14px}
    .score-pill{display:inline-flex;border-radius:999px;padding:8px 14px;font-weight:800}
    .score-pill.good{background:var(--green-bg);color:var(--green)}
    .score-pill.borderline{background:var(--amber-bg);color:var(--amber)}
    .score-pill.bad{background:#fdecec;color:var(--red)}

    .loi-editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .loi-doc{width:100%;min-height:760px;border:1px solid var(--line);border-radius:18px;background:#fff;padding:18px 20px;font:15px/1.65 Georgia,'Times New Roman',serif;color:#2a3550;white-space:pre-wrap}
    .loi-doc:focus{outline:2px solid rgba(31,45,87,.12);border-color:#9fb0cf}
    .loi-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .loi-meta{font-size:13px;color:#7f8da5;margin-top:8px}
    .send-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
    .field textarea.doc-body{min-height:520px;font:15px/1.6 Georgia,'Times New Roman',serif}
    .pdf-preview-card{padding:0;overflow:hidden}
    .pdf-toolbar{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line);background:var(--panel-2)}
    .pdf-toolbar .actions{display:flex;gap:10px;flex-wrap:wrap}
    .pdf-frame-wrap{padding:18px;background:#e8edf5}
    .pdf-frame{width:100%;height:920px;border:1px solid #ccd6e5;border-radius:16px;background:#fff}
    .loi-side-stack{display:grid;gap:18px}
    .letter-note{font-size:13px;color:#7f8da5}

    .footer-note{font-size:13px;color:#8b98ad;margin-top:10px}
    @media (max-width: 1280px){
      .grid-4,.grid-3,.kpi-grid,.uw-form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .pipeline{grid-template-columns:repeat(3,minmax(0,1fr))}
      .review-grid,.uw-grid,.grid-2,.integration-grid,.form-grid{grid-template-columns:1fr}
    }
    @media (max-width: 960px){
      .app{display:block}
      .sidebar{width:100%}
      .main{padding:20px}
      .grid-4,.grid-3,.kpi-grid,.pipeline,.uw-form-grid,.uw-form-grid.two{grid-template-columns:1fr}
      .search{min-width:0;width:100%}
      .toolbar{display:block}
      .toolbar > * + *{margin-top:12px}
      .tabs{overflow:auto}
      table{font-size:14px}
      th,td{padding:14px 10px}
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const state = {
      page: 'deals',
      settingsTab: 'loi',
      newDealStep: 3,
      uwTab: 'dashboard',
      dealFilter: 'All',
      dealSearch: '',
      deals: [
        {name:'Oakwood Apartments', address:'2400 Oak St, Houston, TX', type:'Multifamily', units:124, ask:8200000, offer:7800000, noi:492000, cap:6.0, status:'LOI Sent', date:'Apr 17, 2026'},
        {name:'Riverside Plaza', address:'500 River Rd, Dallas, TX', type:'Mixed-Use', units:68, ask:5500000, offer:null, noi:341000, cap:6.2, status:'Under Review', date:'Apr 12, 2026'},
        {name:'Summit Ridge', address:'900 Summit Dr, Austin, TX', type:'Multifamily', units:200, ask:14800000, offer:null, noi:814000, cap:5.5, status:'Processing', date:'Apr 11, 2026'},
        {name:'Greenway Commons', address:'1100 Greenway Blvd, San Antonio, TX', type:'Multifamily', units:88, ask:6750000, offer:6400000, noi:405000, cap:6.0, status:'LOI Sent', date:'Apr 8, 2026'},
        {name:'Harbor View Lofts', address:'320 Harbor Dr, Corpus Christi, TX', type:'Apartment', units:56, ask:3900000, offer:null, noi:234000, cap:6.0, status:'Docs Uploaded', date:'Apr 7, 2026'},
        {name:'Grand Monarch', address:'Montgomery, TX', type:'Multifamily', units:72, ask:6000000, offer:5650000, noi:467000, cap:7.8, status:'Under Review', date:'Aug 5, 2025'}
      ],
      notifications: { delivered:true, expiry:true, processing:true, lowConfidence:true, weekly:false, updates:false },
      integrations: { drive:true, docusign:false, procore:false, appfolio:false, buildium:false, zapier:false },
      underwriting: {
        propertyName: 'Grand Monarch Apartments',
        propertyAddress: 'Montgomery, TX (Grand Monarch Apartments)',
        market: 'Montgomery, TX',
        purchasePrice: 6000000,
        offerPrice: 5650000,
        marketCap: 6.3,
        actualMonthlyRent: 74750,
        units: 72,
        avgUnitRent: 1319,
        otherIncomeAnnual: 1366,
        vacancyPct: 10,
        opExAnnual: 340000,
        closingCosts: 150000,
        capex: 0,
        reserves: 142549,
        ltv: 70,
        rate: 6.75,
        amortYears: 30,
        ioYears: 1,
        holdYears: 5,
        exitCap: 6.0,
        refiCap: 6.75,
        refiLtv: 75,
        lenderReserves: 0,
        initialEquity: 2092549,
        notes: 'Seeded from Synthesis / Proforma and CoStar comps. Market cap benchmark set to 6.3%.'
      },
      loi: {
        loiDate: 'April 17, 2026',
        purchaserEntity: 'Proverbs31 Underwrite LLC and/or assigns',
        purchaserDisplay: 'Proverbs31 Underwrite LLC',
        propertyAddress: 'Montgomery, TX (Grand Monarch Apartments)',
        offerPrice: 5650000,
        emdAmount: 150000,
        emdDueDays: 3,
        ddDays: 30,
        closeDays: 45,
        financingContingency: 'Yes - loan approval and clear title',
        financeApplicationDays: 15,
        loanApprovalDays: 60,
        offerExpiryDays: 7,
        titleInsurance: "At Seller's expense, Seller shall deliver a preliminary title.",
        purchaserConditions: 'Seller shall provide Purchaser due diligence items, including rent roll, T-12, vendor contracts, tax bills, survey, and major reports.',
        additionalTerms: 'Both parties pay their own legal and brokerage costs unless otherwise agreed in writing. Draft can be revised before sending.',
        sendToEmail: '',
        ccEmail: '',
        replyToEmail: 'P31LS@gmail.com',
        subject: 'Letter of Intent - Grand Monarch Apartments',
        emailMessage: 'Please review the attached Letter of Intent. This draft is editable and can be revised before it is sent.',
        exhibitA1: '1. All tenant leases and rental agreements\n2. All existing vendor and service contracts\n3. Current rent roll and accounts receivable report\n4. Up to date trailing 12 income and expense statement\n5. Current property balance sheet\n6. Trailing utility bills\n7. Recent tax bills\n8. Survey, permits, and major reports\n9. Insurance loss runs\n10. Other customary due diligence materials requested during the review period.',
        documentText: ''
      }
    };
    const icons = { dashboard:'⌂', plus:'＋', bag:'▣', gear:'⚙', folder:'🗂', doc:'📊', house:'🏠', crane:'🏗', building:'🏢', pen:'✍️', bolt:'⚡' };
    function money(n){ return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(n)||0); }
    function num(n){ return Number(String(n).replace(/[$,%\s,]/g,'')) || 0; }
    function pct(n,d=1){ return `${(Number(n)||0).toFixed(d)}%`; }
    function annualDebtService(uw){ const loan = uw.purchasePrice * (uw.ltv/100); const r = uw.rate/100/12; const n = uw.amortYears*12; if (!loan || !n) return 0; const pmt = r === 0 ? loan/n : (loan*r)/(1 - Math.pow(1+r,-n)); return pmt*12; }
    function egi(uw){ return (uw.actualMonthlyRent * 12 * (1 - uw.vacancyPct/100)) + uw.otherIncomeAnnual; }
    function noi(uw){ return egi(uw) - uw.opExAnnual; }
    function capRate(uw){ return uw.purchasePrice ? (noi(uw)/uw.purchasePrice)*100 : 0; }
    function dscr(uw){ const ds = annualDebtService(uw); return ds ? (noi(uw)/ds) : 0; }
    function loanAmount(uw){ return uw.purchasePrice * (uw.ltv/100); }
    function equityNeeded(uw){ return uw.purchasePrice - loanAmount(uw) + uw.closingCosts + uw.capex + uw.reserves + uw.lenderReserves; }
    function totalCashInvested(uw){ return uw.initialEquity && uw.initialEquity > 0 ? uw.initialEquity : equityNeeded(uw); }
    function terminalValue(uw){ return uw.exitCap ? noi(uw)/(uw.exitCap/100) : 0; }
    function remainingBalance(uw){ const principal = loanAmount(uw); const r = uw.rate/100/12; const n = uw.amortYears*12; const m = Math.max((uw.holdYears - uw.ioYears) * 12, 0); if (!principal) return 0; if (r === 0) { const pmt = principal / n; return Math.max(0, principal - pmt*m); } const pmt = (principal*r)/(1 - Math.pow(1+r,-n)); if (m <= 0) return principal; return principal*Math.pow(1+r,m) - pmt*((Math.pow(1+r,m)-1)/r); }
    function annualPreTaxCashFlow(uw, year = 1){ const ioDebt = loanAmount(uw) * (uw.rate/100); const amortDebt = annualDebtService(uw); const debt = year <= uw.ioYears ? ioDebt : amortDebt; return noi(uw) - debt; }
    function totalCashDistributions(uw){ let total = 0; for (let y = 1; y <= uw.holdYears; y++){ total += annualPreTaxCashFlow(uw, y); } return total; }
    function netSaleProceeds(uw){ const saleCosts = terminalValue(uw) * 0.01; return Math.max(terminalValue(uw) - saleCosts - remainingBalance(uw), 0); }
    function cashOnCash(uw){ const invested = totalCashInvested(uw); return invested ? (annualPreTaxCashFlow(uw, 1) / invested) : 0; }
    function equityMultiple(uw){ const invested = totalCashInvested(uw); return invested ? ((totalCashDistributions(uw) + netSaleProceeds(uw)) / invested) : 0; }
    function irrFromCashFlows(flows){
      if (!flows || flows.length < 2) return 0;
      const npv = (rate) => flows.reduce((sum, cf, i) => sum + (cf / Math.pow(1 + rate, i)), 0);
      let low = -0.99, high = 10;
      let npvLow = npv(low), npvHigh = npv(high);
      let expand = 0;
      while (npvLow * npvHigh > 0 && expand < 50){
        high *= 2;
        npvHigh = npv(high);
        expand += 1;
      }
      if (npvLow * npvHigh > 0) return 0;
      for (let i = 0; i < 200; i++){
        const mid = (low + high) / 2;
        const npvMid = npv(mid);
        if (Math.abs(npvMid) < 0.0000001) return mid;
        if (npvLow * npvMid <= 0){
          high = mid;
          npvHigh = npvMid;
        } else {
          low = mid;
          npvLow = npvMid;
        }
      }

    function irr(uw){
      const flows = [-totalCashInvested(uw)];
      for (let y = 1; y <= uw.holdYears; y++){
        let cf = annualPreTaxCashFlow(uw, y);
        if (y === uw.holdYears) cf += netSaleProceeds(uw);
        flows.push(cf);
      }
      return irrFromCashFlows(flows) * 100;
    }

          <div class="ex-title">EXHIBIT A-1</div>
          <div class="ex-sub">Purchaser Conditions and Due Diligence Deliverables</div>
          <div class="ex-body">${nlToHtml(loi.exhibitA1)}</div>
        </div>
      </div></body></html>`;
    }
    function openLoiPrintPreview(){
      const win = window.open('', '_blank');
      if (!win) return;
      win.document.open();
      win.document.write(buildLoiPreviewHtml());
      win.document.close();
      setTimeout(() => { try { win.focus(); win.print(); } catch (e) {} }, 350);
    }
    function render(){ if (!state.loi.documentText || !state.loi.documentText.trim()) state.loi.documentText = buildLoiDraft(); const html = `<div class="app">${renderSidebar()}<main class="main"><div class="topbar"><div><div class="title">${pageTitle()}</div><div class="subtitle">${pageSubtitle()}</div></div><button class="${state.page==='settings' ? 'save-btn' : 'top-action'}" id="topAction">${topActionLabel()}</button></div>${state.page === 'dashboard' ? renderDashboard() : ''}${state.page === 'deals' ? renderDealsPage() : ''}${state.page === 'newDeal' ? renderNewDealPage() : ''}${state.page === 'settings' ? renderSettingsPage() : ''}</main></div>`; document.getElementById('app').innerHTML = html; bindEvents(); renderCharts(); }
    function bindEvents(){ document.querySelectorAll('[data-nav]').forEach(btn => { btn.onclick = () => { state.page = btn.dataset.nav; render(); }; }); document.querySelectorAll('[data-filter]').forEach(btn => { btn.onclick = () => { state.dealFilter = btn.dataset.filter; render(); }; }); document.querySelectorAll('[data-step]').forEach(btn => { btn.onclick = () => { state.newDealStep = Number(btn.dataset.step); render(); }; }); document.querySelectorAll('[data-stab]').forEach(btn => { btn.onclick = () => { state.settingsTab = btn.dataset.stab; render(); }; }); document.querySelectorAll('[data-uwtab]').forEach(btn => { btn.onclick = () => { state.uwTab = btn.dataset.uwtab; render(); }; }); document.querySelectorAll('[data-switch]').forEach(btn => { btn.onclick = () => { const k = btn.dataset.switch; state.notifications[k] = !state.notifications[k]; render(); }; }); document.querySelectorAll('[data-connect]').forEach(btn => { btn.onclick = () => { const k = btn.dataset.connect; state.integrations[k] = true; render(); }; }); document.querySelectorAll('[data-open]').forEach(btn => { btn.onclick = () => { state.page = 'newDeal'; state.newDealStep = 3; render(); }; }); document.querySelectorAll('[data-upload]').forEach(btn => { btn.onclick = () => { const input = document.getElementById(btn.dataset.upload); if (input) input.click(); }; }); const search = document.getElementById('dealSearch'); if (search) search.oninput = (e) => { state.dealSearch = e.target.value; render(); }; const topAction = document.getElementById('topAction'); if (topAction) topAction.onclick = () => { if (state.page === 'settings') alert('Settings saved'); else { state.page = 'newDeal'; state.newDealStep = 1; render(); } }; const seedBtn = document.getElementById('seedGrandMonarch'); if (seedBtn) seedBtn.onclick = () => { Object.assign(state.underwriting, { propertyName:'Grand Monarch Apartments', propertyAddress:'Montgomery, TX (Grand Monarch Apartments)', market:'Montgomery, TX', purchasePrice:6000000, offerPrice:5650000, marketCap:6.3, actualMonthlyRent:74750, units:72, avgUnitRent:1319, otherIncomeAnnual:1366, vacancyPct:10, opExAnnual:340000, closingCosts:150000, capex:0, reserves:142549, ltv:70, rate:6.75, amortYears:30, ioYears:1, holdYears:5, exitCap:6.0, refiCap:6.75, refiLtv:75, lenderReserves:0, initialEquity:2092549 });
      Object.assign(state.loi, { propertyAddress:'Montgomery, TX (Grand Monarch Apartments)', offerPrice:5650000, documentText:'', sendToEmail:'', subject:'Letter of Intent - Grand Monarch Apartments' });
      state.newDealStep = 3; render(); }; document.querySelectorAll('[data-uw]').forEach(input => { input.onchange = (e) => { const k = input.dataset.uw; state.underwriting[k] = num(e.target.value); render(); }; }); document.querySelectorAll('[data-uw-text]').forEach(input => { input.onchange = (e) => { const k = input.dataset.uwText; state.underwriting[k] = e.target.value; if (k === 'propertyAddress' && !state.loi.propertyAddress) state.loi.propertyAddress = e.target.value; render(); }; });
      document.querySelectorAll('[data-loi]').forEach(input => { input.onchange = (e) => { const k = input.dataset.loi; state.loi[k] = num(e.target.value); if (k === 'offerPrice') state.underwriting.offerPrice = num(e.target.value); render(); }; });
      document.querySelectorAll('[data-loi-text]').forEach(input => { input.onchange = (e) => { const k = input.dataset.loiText; state.loi[k] = e.target.value; render(); }; });
      document.querySelectorAll('[data-loi-refresh]').forEach(btn => { btn.onclick = () => { state.loi.propertyAddress = state.underwriting.propertyAddress || state.loi.propertyAddress; state.loi.offerPrice = state.underwriting.offerPrice > 0 ? state.underwriting.offerPrice : loiOfferPrice(); state.loi.subject = `Letter of Intent - ${state.underwriting.propertyName}`; state.loi.documentText = buildLoiDraft(); render(); }; });
      document.querySelectorAll('[data-loi-print]').forEach(btn => { btn.onclick = () => { openLoiPrintPreview(); }; });
      document.querySelectorAll('[data-send-loi]').forEach(btn => { btn.onclick = () => { if (!state.loi.sendToEmail.trim()) { alert('Type the recipient email address before sending the LOI.'); return; } const preview = `To: ${state.loi.sendToEmail}\nCC: ${state.loi.ccEmail || 'None'}\nReply-To: ${state.loi.replyToEmail}\nSubject: ${state.loi.subject}\n\nThe LOI is ready for final review.`; alert(preview); }; });
      const proformaInput = document.getElementById('upload-proforma'); if (proformaInput) proformaInput.onchange = handleProformaUpload; const rentInput = document.getElementById('upload-rent'); if (rentInput) rentInput.onchange = handleRentUpload; const compsInput = document.getElementById('upload-comps'); if (compsInput) compsInput.onchange = () => { alert('Comp files attached. In a production build, this would run OCR / parsing and reset the market cap benchmark.'); }; }
    function handleProformaUpload(e){ const file = e.target.files && e.target.files[0]; if (!file) return; const ext = file.name.split('.').pop().toLowerCase(); if (!['xlsx','xls','csv'].includes(ext)) { alert('Upload an XLSX, XLS, or CSV proforma for auto-mapping.'); return; } const reader = new FileReader(); reader.onload = evt => { try { if (ext === 'csv') { const text = String(evt.target.result); const rows = text.split(/\r?\n/).map(r => r.split(',')); seedFromRows(rows); } else { const wb = XLSX.read(evt.target.result, {type:'binary'}); const ws = wb.Sheets[wb.SheetNames[0]]; const rows = XLSX.utils.sheet_to_json(ws, {header:1}); seedFromRows(rows); } state.newDealStep = 3; render(); } catch (err) { console.error(err); alert('Could not read the proforma. The manual inputs are still available.'); } }; if (ext === 'csv') reader.readAsText(file); else reader.readAsBinaryString(file); }
    function seedFromRows(rows){ 
      const flat = rows.flat().map(v => String(v || '').trim()); 
      const joined = flat.join(' | ').toLowerCase(); 
      if (joined.includes('grand monarch')) state.underwriting.propertyName = 'Grand Monarch Apartments'; 
      
      // Look for specific keywords in rows to map data
      rows.forEach(row => {
        const rowStr = row.join(' | ').toLowerCase();
        if (rowStr.includes('purchase price') || rowStr.includes('acquisition price')) {
          const val = row.map(v => num(v)).find(v => v > 100000);
          if (val) state.underwriting.purchasePrice = val;
        }
        if (rowStr.includes('units') || rowStr.includes('number of units')) {
          const val = row.map(v => num(v)).find(v => v > 0 && v < 10000);
          if (val) state.underwriting.units = val;
        }
      });

      const numericValues = flat.map(v => num(v)).filter(v => v > 0); 
      if (numericValues.length && !state.underwriting.purchasePrice) { 
        const maybePrice = numericValues.find(v => v >= 500000 && v <= 50000000); 
        if (maybePrice) state.underwriting.purchasePrice = maybePrice; 
      } 
      alert('File processed! Some fields may have been auto-filled.');
    }
    function handleRentUpload(e){ const file = e.target.files && e.target.files[0]; if (!file) return; const ext = file.name.split('.').pop().toLowerCase(); if (!['xlsx','xls','csv'].includes(ext)) { alert('Use CSV or Excel for the rent roll upload in this static prototype.'); return; } const reader = new FileReader(); reader.onload = evt => { try { let rows = []; if (ext === 'csv') rows = String(evt.target.result).split(/\r?\n/).map(r => r.split(',')); else { const wb = XLSX.read(evt.target.result, {type:'binary'}); const ws = wb.Sheets[wb.SheetNames[0]]; rows = XLSX.utils.sheet_to_json(ws, {header:1}); } const header = (rows[0] || []).map(v => String(v).toLowerCase()); let rentIdx = header.findIndex(h => h.includes('rent')); if (rentIdx < 0) rentIdx = 1; const total = rows.slice(1).reduce((sum,row) => sum + num(row[rentIdx]), 0); if (total > 0) state.underwriting.actualMonthlyRent = total; render(); } catch (err) { console.error(err); alert('Could not parse the rent roll.'); } }; if (ext === 'csv') reader.readAsText(file); else reader.readAsBinaryString(file); }
    let scoreChartRef = null; let incomeChartRef = null;
    function renderCharts(){ if (document.getElementById('scoreChart')) { const ctx = document.getElementById('scoreChart').getContext('2d'); if (scoreChartRef) scoreChartRef.destroy(); const s = dealScore(state.underwriting).score; scoreChartRef = new Chart(ctx,{ type:'doughnut', data:{ labels:['Score','Remaining'], datasets:[{ data:[s, Math.max(0,3-s)], backgroundColor:['#1f2d57','#e8edf5'], borderWidth:0, cutout:'72%' }] }, options:{ plugins:{ legend:{display:false}, tooltip:{enabled:false} } }, plugins:[{ id:'centerText', afterDraw(chart){ const c = dealScore(state.underwriting); const {ctx} = chart; ctx.save(); ctx.textAlign='center'; ctx.fillStyle='#253047'; ctx.font='700 32px Inter, sans-serif'; ctx.fillText(c.score.toFixed(1), chart.width/2, chart.height/2 - 6); ctx.fillStyle='#7a879d'; ctx.font='600 14px Inter, sans-serif'; ctx.fillText('out of 3.0', chart.width/2, chart.height/2 + 18); ctx.restore(); } }] }); }
      if (document.getElementById('incomeChart')) { const ctx = document.getElementById('incomeChart').getContext('2d'); if (incomeChartRef) incomeChartRef.destroy(); incomeChartRef = new Chart(ctx,{ type:'bar', data:{ labels:['Rent + Other','OpEx','Debt Service','Annual Pre-Tax CF','NOI'], datasets:[{ data:[ egi(state.underwriting), state.underwriting.opExAnnual, annualDebtService(state.underwriting), annualPreTaxCashFlow(state.underwriting, 1), noi(state.underwriting) ], backgroundColor:['#1f2d57','#92a4c6','#d39a32','#7f67e8','#67c16f'], borderRadius:10 }] }, options:{ scales:{ y:{ ticks:{ callback:(value)=> '$' + Number(value).toLocaleString() }, grid:{color:'#e9eef6'} }, x:{grid:{display:false}} }, plugins:{legend:{display:false}} } }); } }
    render();
  </script>
